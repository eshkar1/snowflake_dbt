name: 'ironscales_dbt_project'
version: '1.0.0'
config-version: 2

profile: 'snowflake'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"


models:
  ironscales_dbt_project:

    prod:
      +schema: dbt_prod_db
      +materialized: table
      +tags: p1
      +grants:
        select: ['RIVERY_ROLE','RIVERY_ROLE_UPDATED','SNOWFLAKE_FINANCE_ANALYST_ROLE']

    conform:
      +schema: dbt_stage_db
      +materialized: view
      +tags: p1
      +grants:
        select: ['RIVERY_ROLE','RIVERY_ROLE_UPDATED','SNOWFLAKE_FINANCE_ANALYST_ROLE']

    stage:
      +schema: dbt_raw_db
      +materialized: table
      +grants:
        select: ['RIVERY_ROLE','RIVERY_ROLE_UPDATED']

    # -------------------------------------------------------
    # Billing layer — isolated calculation pipeline
    # models/billing/
    # Run all billing:  dbt run --select tag:billing
    # Run HWM only:     dbt run --select tag:hwm
    # Run no-HWM only:  dbt run --select tag:no_hwm
    # -------------------------------------------------------
    billing:
      +tags: billing
      +grants:
        select: ['RIVERY_ROLE','RIVERY_ROLE_UPDATED','SNOWFLAKE_FINANCE_ANALYST_ROLE']

      staging:
        +schema: dbt_billing_staging_db
        +materialized: view
        +grants:
          select: ['RIVERY_ROLE','RIVERY_ROLE_UPDATED']

      intermediate:
        +schema: dbt_billing_int_db
        +materialized: view
        hwm:
          +tags: ['billing', 'hwm']
        no_hwm:
          +tags: ['billing', 'no_hwm']

      marts:
        +schema: dbt_billing_db
        +materialized: table