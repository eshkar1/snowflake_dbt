version: 2

models:
  - name: metricflow_time_spine
    description: >
      Required time spine model for the dbt Semantic Layer (MetricFlow).
      Contains one row per day from 2020-01-01 to 2 years from today.
      Do not query this table directly — it is used internally by MetricFlow
      for time-based metric aggregations.
    config:
      meta:
        is_metricflow_time_spine: true

time_spine:
  name: metricflow_time_spine
  node_relation:
    alias: metricflow_time_spine
  columns:
    - name: date_day
      granularity: day
